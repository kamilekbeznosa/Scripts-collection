name: Python Automation Toolkit CI

on:
  push:
    paths:
      - 'python/**'
      - '.github/workflows/python-ci.yml'
  pull_request:
    paths:
      - 'python/**'

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Code Formatting & Linting (Ruff)
        run: |
          ruff check .
          ruff format --check .

      - name: Run Tests with Coverage
        env:
          GITHUB_TOKEN: "dummy_token"
          AZURE_SUBSCRIPTION_ID: "dummy_sub"
          WEBHOOK_URL: "http://dummy.webhook"
        run: |
          pytest --cov=src/devops_toolkit --cov-fail-under=40